<div class="app">
  <section class="builder">
    <div class="builderHead"><h1>Twitch 即時訂閱打王</h1><div class="statusPill" id="dataStatus">離線測試可用</div></div>

    </div>

function emptyState(){return{title:"Twitch Live Battle",subTitle:"ROUND 1",round:1,bossTotal:70000,externalTargetSub:null,openTime:null,autoDrainedHp:0,subDamage:1,bossDrop:"打倒 BOSS 獎勵",damage:0,playing:false,busy:false,queue:[],eventCount:0,receivedSubs:0,timer:null,drainTimer:null,failTimer:null,countdownTimer:null,resultTimer:null,escapeEndsAt:null,overtimeStartedAt:null,unlocked:0,rankRows:[],autoDrainSeconds:AUTO_DRAIN_SECONDS,autoDrainHp:AUTO_DRAIN_HP,failAfterMinutes:0,ended:false,defeated:false,rankFrozen:false,displayModule:false,lastReachTarget:null,rollResults:new Map(),rollRolling:new Set(),rollValues:new Map()}}
function showNotice(text,isBad=false){els.notice.textContent=text;els.notice.classList.toggle("show",!!text);els.notice.style.borderColor=isBad?"#793147":"#315f55";els.notice.style.background=isBad?"#32121b":"#10251f"}
function preloadImage(src){return new Promise(resolve=>{const img=new Image();img.decoding="async";img.onload=()=>{if(img.decode)img.decode().catch(()=>{}).finally(resolve);else resolve()};img.onerror=resolve;img.src=src})}
function ensureHeroAssets(){if(heroAssetsReady)return Promise.resolve();if(heroAssetsLoading)return heroAssetsPromise;heroAssetsLoading=true;heroAssetsPromise=Promise.all(heroSprites.map(x=>preloadImage(x.img))).then(()=>{heroAssetsReady=true});return heroAssetsPromise}
function applySettings(){pause(false);state={...emptyState(),bossTotal:Number(els.bossHpInput.value)||70000,subDamage:Math.max(1,Number(els.subDamageInput.value)||1)};resetBattle(false);showNotice("設定已套用，按開始監聽後就會接收訂閱事件。");return true}
function renderHp(){const remain=state.bossTotal-state.damage,pct=state.bossTotal>0?Math.max(0,Math.min(100,remain/state.bossTotal*100)):0;els.hpBars.querySelector("i").style.width=pct+"%";els.countText.textContent=`HP ${fmt(remain)}/${fmt(state.bossTotal)}`;renderTotalSubs()}

function renderRank(){const rows=state.rankRows.slice(0,10);els.rankList.innerHTML=rows.map((row,i)=>{const name=row.name,val=row.amount,safe=escapeHtml(name),rolled=state.rollResults.has(name),rolling=state.rollRolling.has(name),disabled=!state.defeated||rolled||rolling,roll=rolled?`<span class="rollResult">${state.rollResults.get(name)}</span>`:rolling?`<span class="rollResult rolling">${state.rollValues.get(name)||"--"}</span>`:`<button class="rollBtn" type="button" data-roll-name="${safe}" ${disabled?"disabled":""} title="ROLL 裝">🎲</button>`;return`<div class="rankRow"><div class="no">#${i+1}</div><div class="name">${safe}</div><div class="dmg">${fmt(val)}</div><div class="rollCell">${roll}</div></div>`}).join("")||'<div class="logLine">尚無傷害</div>'}

function attackTier(amount){if(amount>=1000)return"mega";if(amount>=100)return"critical";return"normal"}function applyDamageStyle(amount){const t=attackTier(amount);els.damageText.classList.toggle("critical",t==="critical");els.damageText.classList.toggle("mega",t==="mega")}
function attackMessage(a){const t=attackTier(a.amount);if(t==="mega")return`${a.name} 使用一瞬千訂 造成 ${fmt(a.amount)} 傷害`;if(t==="critical")return`${a.name} 使用奮力一擊 造成 ${fmt(a.amount)} 傷害`;return`${a.name} 造成 ${fmt(a.amount)} 傷害`}
function renderAttacker(a){const t=attackTier(a.amount);els.attackerName.textContent=a.name;if(t==="mega")els.attackerMeta.innerHTML=`${escapeHtml(a.name)} 使用<span class="attackVerb">一瞬千訂</span> 造成 ${fmt(a.amount)} 傷害`;else if(t==="critical")els.attackerMeta.innerHTML=`${escapeHtml(a.name)} <span class="attackVerb">使用奮力一擊</span> 造成 ${fmt(a.amount)} 傷害`;else els.attackerMeta.textContent=`${a.name} 造成 ${fmt(a.amount)} 傷害`;els.attackDamage.textContent="-"+fmt(a.amount)}
function logLine(text){const line=document.createElement("div");line.className="logLine";line.textContent=text;els.log.prepend(line);while(els.log.children.length>18)els.log.lastChild.remove()}
function makeHero(a,slot,sprite){const h=document.createElement("div"),faceLeft=sprite.reverseFacing?slot.x<50:slot.x>50;h.className="hero"+(faceLeft?" faceLeft":"");h.style.left=(slot.x<50?-16:104)+"%";h.style.top=slot.y+"%";h.innerHTML=`<div class="sheep"><img class="heroSprite" src="${sprite.img}" alt=""></div><div class="weapon">${sprite.fx}</div><div class="heroName">${escapeHtml(a.name)}</div>`;els.heroLayer.appendChild(h);requestAnimationFrame(()=>requestAnimationFrame(()=>{h.classList.add("active");h.style.left=slot.x+"%"}));return h}
function projectile(slot,sprite){const p=document.createElement("div");p.className="projectile";p.textContent=sprite.fx==="SHOT"?">>":sprite.fx==="SPARK"?"*":sprite.fx==="SMASH"?"!":"/";p.style.setProperty("--sx",(slot.x-50)*7+"px");p.style.setProperty("--sy",(slot.y-45)*4+"px");p.style.left="50%";p.style.top="45%";els.arena.appendChild(p);p.classList.add("fly");setTimeout(()=>p.remove(),330)}
function queueDamage(name,damage,subs=damage){if(state.ended)return;const finalDamage=Math.max(1,Math.floor(Number(damage)||1)),subCount=Math.max(0,Math.floor(Number(subs)||0));state.queue.push({name,amount:finalDamage});if(!state.displayModule)state.receivedSubs+=subCount;state.eventCount+=1;renderProgress();if(state.playing)processQueue()}
function queueAttack(name,amount=1){const hits=Math.max(1,Math.floor(Number(amount)||1));queueDamage(name,hits*state.subDamage,hits)}
function queueVisualAttack(name,amount=1){const hits=Math.max(1,Math.floor(Number(amount)||1));state.queue.push({name:String(name||"test_sheep"),amount:hits*state.subDamage,visualOnly:true});state.eventCount+=1;renderProgress();if(state.playing)processQueue()}
function renderProgress(){els.progressLabel.textContent=`${fmt(state.receivedSubs)} 訂閱`;els.summaryText.textContent=`佇列 ${state.queue.length} 筆`;els.progressBar.style.width=Math.min(100,state.receivedSubs%100)+"%";renderTotalSubs()}
function processQueue(){if(!state.playing||state.busy||state.ended)return;if(!state.queue.length){return}if(!heroAssetsReady){showNotice("正在準備勇者圖片，第一筆攻擊會稍微等待。");ensureHeroAssets().then(()=>{showNotice("");processQueue()});return}state.busy=true;const a=state.queue.shift(),slot=slots[state.eventCount%slots.length],sprite=heroSprites[state.eventCount%heroSprites.length],hero=makeHero(a,slot,sprite);els.roundText.textContent=state.subTitle||`ROUND ${state.round}`;renderHp();renderAttacker(a);setTimeout(()=>{if(!state.playing||state.ended)return;const wasDefeated=state.defeated||state.damage>=state.bossTotal;hero.classList.add("attack");projectile(slot,sprite);els.boss.classList.add("hit");applyDamageStyle(a.amount);els.damageText.textContent="-"+fmt(a.amount);els.damageText.classList.remove("pop");void els.damageText.offsetWidth;els.damageText.classList.add("pop");if(!a.visualOnly&&!state.displayModule)state.damage+=a.amount;renderHp();logLine(attackMessage(a));setTimeout(()=>els.boss.classList.remove("hit"),150);if(!a.visualOnly&&!wasDefeated&&state.damage>=state.bossTotal)finish()},460);setTimeout(()=>{hero.remove();state.busy=false;renderProgress();if(!state.ended)processQueue()},760)}
function stopTimers(){if(state.timer)clearTimeout(state.timer);if(state.drainTimer)clearInterval(state.drainTimer);if(state.failTimer)clearTimeout(state.failTimer);if(state.countdownTimer)clearInterval(state.countdownTimer);if(state.resultTimer)clearTimeout(state.resultTimer);state.timer=state.drainTimer=state.failTimer=state.countdownTimer=state.resultTimer=null}
function showResult(text){if(state.resultTimer)clearTimeout(state.resultTimer);els.resultText.textContent=text;els.victory.classList.add("show");state.resultTimer=setTimeout(()=>{els.victory.classList.remove("show");state.resultTimer=null},3000)}
function ensureHpSyncTimer(){if(hpSyncTimer)return;hpSyncTimer=setInterval(syncHpFromOpenTime,1000)}
function startTimers(){stopTimers();state.autoDrainSeconds=AUTO_DRAIN_SECONDS;state.autoDrainHp=AUTO_DRAIN_HP;ensureHpSyncTimer()}
function autoDrainBoss(){syncHpFromOpenTime()}
function start(){if(!state.bossTotal)applySettings();if(state.ended)resetBattle(false);const alreadyPlaying=state.playing&&!state.ended;state.playing=true;state.ended=false;els.victory.classList.remove("show");if(!alreadyPlaying&&!state.defeated)startTimers();processQueue();showNotice("已開始監聽。Twitch 或測試訂閱都會即時進場。")}
function pause(show=true){stopTimers();state.playing=false;if(show)showNotice("已暫停。")}
function resetBattle(show=true){stopTimers();state.damage=0;state.unlocked=0;state.ended=false;state.defeated=false;state.rankFrozen=false;state.busy=false;state.queue=[];state.receivedSubs=0;state.eventCount=0;state.overtimeStartedAt=null;state.rankRows=[];state.rollResults.clear();state.rollRolling.clear();state.rollValues.clear();els.showTitle.textContent=state.title||"Twitch Live Battle";els.heroLayer.innerHTML="";els.log.innerHTML="";els.loot.classList.remove("show");els.loot.innerHTML="";els.escapeNotice.classList.remove("show");els.mvpHero.classList.remove("show");els.mvpHero.innerHTML="";els.progressBar.style.width="0";els.progressLabel.textContent="0 訂閱";renderTotalSubs();els.attackerName.textContent="準備中";els.attackerMeta.textContent="";els.attackDamage.textContent="-0";els.roundText.textContent=state.subTitle||`ROUND ${state.round}`;els.boss.classList.remove("escape");els.boss.querySelector("img").src=BOSS_NORMAL;els.resultText.textContent="VICTORY";els.victory.classList.remove("show");els.summaryText.textContent="等待事件";updateOvertimeClock();renderHp();renderRank();renderCompletedRewards();if(show)showNotice("戰鬥已重置。")}
function topHero(){return state.rankRows.length?state.rankRows[0]:null}
function showMvpHero(){}
function showLoot(name){els.loot.innerHTML=`<div class="lootChest"></div><div class="lootReward">掉寶獎勵：${escapeHtml(name)}</div>`;els.loot.classList.remove("show");void els.loot.offsetWidth;els.loot.classList.add("show")}
function finish(){if(state.defeated||state.ended)return;state.defeated=true;if(!state.overtimeStartedAt)state.overtimeStartedAt=Date.now();state.rankFrozen=false;stopTimers();state.escapeEndsAt=null;state.unlocked=1;renderHp();updateOvertimeClock();renderCompletedRewards();showLoot(state.bossDrop);renderRank();els.boss.querySelector("img").src=BOSS_DEFEAT;showResult("VICTORY")}
function rollGear(name){if(!state.defeated||state.rollResults.has(name)||state.rollRolling.has(name))return;state.rollRolling.add(name);let ticks=0;const timer=setInterval(()=>{ticks++;state.rollValues.set(name,Math.floor(Math.random()*100)+1);renderRank();if(ticks>=16){clearInterval(timer);const final=Math.floor(Math.random()*100)+1;state.rollRolling.delete(name);state.rollValues.delete(name);state.rollResults.set(name,final);renderRank()}},70)}
function fail(){}
function reviveBoss(){state.defeated=false;state.ended=false;state.rankFrozen=false;state.unlocked=0;state.escapeEndsAt=null;state.overtimeStartedAt=null;state.rollResults.clear();state.rollRolling.clear();state.rollValues.clear();els.boss.classList.remove("escape");els.boss.querySelector("img").src=BOSS_NORMAL;els.victory.classList.remove("show");els.loot.classList.remove("show");els.loot.innerHTML="";updateOvertimeClock();renderCompletedRewards()}
function applyExternalState(s){if(!s)return;const target=Number(s.targetSub),current=Number(s.currentSub),hasReach=typeof s.reachTarget==="boolean";if(typeof s.title==="string"&&s.title.trim()){state.title=s.title.trim();els.showTitle.textContent=state.title}if(typeof s.giftName==="string"&&s.giftName.trim()){state.bossDrop=s.giftName.trim();renderCompletedRewards();const reward=els.loot.querySelector(".lootReward");if(reward)reward.textContent=`掉寶獎勵：${state.bossDrop}`}if(typeof s.subTitle==="string"&&s.subTitle.trim()){state.subTitle=s.subTitle.trim();els.roundText.textContent=state.subTitle}if(typeof s.openTime==="number"&&s.openTime>0)state.openTime=s.openTime;if(typeof s.displayModule==="boolean")state.displayModule=s.displayModule;if(hasReach&&s.reachTarget===false&&state.defeated){reviveBoss();if(state.playing)startTimers()}if(Number.isFinite(target)&&target>0){state.externalTargetSub=target;els.bossHpInput.value=target}if(Number.isFinite(current)&&current>=0){state.receivedSubs=current;if(state.displayModule)state.damage=current}ensureHpSyncTimer();syncHpFromOpenTime();if(Array.isArray(s.rank)){state.rankRows=s.rank.map(r=>({name:String(r.name),amount:Math.max(0,Math.floor(Number(r.amount)||0))}));renderRank()}renderProgress();if(hasReach){state.lastReachTarget=s.reachTarget;if(s.reachTarget)finish()}}
function applyRemoteSettings(s){if(!s)return;remoteConfig={...remoteConfig,...s};els.failMinutesInput.value=0}function handleControl(action){if(action==="start")start();if(action==="pause")pause(false);if(action==="reset")resetBattle(false)}
function forceBossDeadForTest(seconds=0){state.defeated=false;finish();state.overtimeStartedAt=Date.now()-Math.max(0,Number(seconds)||0)*1000;updateOvertimeClock();ensureHpSyncTimer()}
function forceBossAliveForTest(){reviveBoss();ensureHpSyncTimer()}
function readSavedSettings(){try{return JSON.parse(localStorage.getItem(CONFIG_KEY)||"{}")}catch(e){return{}}}
async function loadRemoteSettings(){let fileSettings={};try{const r=await fetch("config.json",{cache:"no-store"});if(r.ok)fileSettings=await r.json()}catch(e){}applyRemoteSettings({...fileSettings,...readSavedSettings()})}
function firstValue(obj,keys,def=""){for(const k of keys){if(obj&&obj[k]!==undefined&&obj[k]!==null&&obj[k]!=="")return obj[k]}return def}
function toInt(v,def=0){const n=Number(v);return Number.isFinite(n)?Math.floor(n):def}
function toBool(v){if(typeof v==="boolean")return v;if(typeof v==="number")return v!==0;if(typeof v==="string"){const s=v.trim().toLowerCase();if(["true","1","yes","y","on"].includes(s))return true;if(["false","0","no","n","off"].includes(s))return false}return undefined}
function normalizeOpenTime(v){const n=Number(v);if(!Number.isFinite(n)||n<=0)return null;return n<1000000000000?n*1000:n}
function openTimeDrain(){if(!state.displayModule||!state.openTime)return 0;const elapsedMs=Math.min(MAX_OPEN_TIME_ELAPSED_MS,Math.max(0,Date.now()-state.openTime));return Math.floor(elapsedMs/(AUTO_DRAIN_SECONDS*1000))*AUTO_DRAIN_HP}
function formatOvertime(ms){const max=99*60+99,capped=Math.min(max,Math.max(0,Math.floor(ms/1000))),m=capped>=max?99:Math.floor(capped/60),s=capped>=max?99:capped%60;return`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`}
function updateOvertimeClock(){if(!state.defeated||!state.overtimeStartedAt){els.overtimeClock.classList.remove("show","danger");return}const elapsed=Date.now()-state.overtimeStartedAt;els.overtimeClock.textContent=`超時時間 ${formatOvertime(elapsed)}`;els.overtimeClock.classList.toggle("danger",elapsed>=5*60*1000);els.overtimeClock.classList.add("show")}
function syncHpFromOpenTime(){const target=Number(state.externalTargetSub);if(Number.isFinite(target)&&target>0){const drain=Math.min(target,openTimeDrain());state.autoDrainedHp=drain;state.bossTotal=Math.max(0,target-drain);if(state.displayModule)state.damage=state.receivedSubs;renderHp()}updateOvertimeClock()}
function normalizeRank(rank){const values=Array.isArray(rank)?rank:rank&&typeof rank==="object"?Object.values(rank):[];return values.filter(x=>x&&typeof x==="object").map(x=>({name:String(firstValue(x,["displayName","display_name","name","user","userName","user_name"],"")),amount:toInt(firstValue(x,["count","amount","damage","total","score","sub","subs"],0),0)})).filter(x=>x.name)}
function normalizeExternalMessage(msg){if(!msg||typeof msg!=="object")return null;const eventType=String(firstValue(msg,["type","event","eventType","event_type","cmd"],"")).toUpperCase(),data=msg.data&&typeof msg.data==="object"?msg.data:msg;if(eventType==="OFF_DAMAGE"||("amount" in data&&firstValue(data,["displayName","display_name","name","user"],""))){const name=firstValue(data,["displayName","display_name","name","user","userName","user_name"],"anonymous"),amount=toInt(firstValue(data,["amount","damage","sub","subs"],1),1);return{type:"damage",user:String(name),amount:Math.max(1,amount)}}if(eventType==="OFF_METADATA"||["currentSub","targetSub","rank","reachTarget","displayModule","title","giftName","subTitle","openTime"].some(k=>k in data)){const payload={type:"external_state"};if("title" in data)payload.title=String(data.title);if("giftName" in data)payload.giftName=String(data.giftName);if("subTitle" in data)payload.subTitle=String(data.subTitle);if("openTime" in data)payload.openTime=normalizeOpenTime(data.openTime);if("currentSub" in data)payload.currentSub=toInt(data.currentSub);if("targetSub" in data)payload.targetSub=toInt(data.targetSub);const reach=toBool(data.reachTarget);if(reach!==undefined)payload.reachTarget=reach;const display=toBool(data.displayModule);if(display!==undefined)payload.displayModule=display;if("rank" in data)payload.rank=normalizeRank(data.rank);return payload}return null}
function handleTestPayload(data){if(!data||data.type!=="test_attack")return;const testId=String(data.id||"");if(testId&&sessionStorage.getItem("lastSheepBossTestId")===testId)return;if(testId)sessionStorage.setItem("lastSheepBossTestId",testId);queueVisualAttack(data.user||"test_sheep",data.amount||1);start()}
function handleStoredTest(value){try{const data=JSON.parse(value||"{}"),age=Date.now()-Number(data.id||0);if(age>=0&&age<120000)handleTestPayload(data)}catch(e){}}
function handleUrlTest(){const q=new URLSearchParams(location.search),testId=q.get("testId");if(!testId)return;handleTestPayload({type:"test_attack",id:testId,user:q.get("testUser")||"test_sheep",amount:Number(q.get("testAmount"))||1})}
function setupTestReceivers(){if("BroadcastChannel" in window){const channel=new BroadcastChannel(CHANNEL_KEY);channel.onmessage=e=>handleTestPayload(e.data)}window.addEventListener("message",e=>handleTestPayload(e.data))}
function handleMessage(msg){if(msg.type==="subscription"&&state.displayModule)queueAttack(msg.user||"anonymous",msg.amount||1);if(msg.type==="damage"&&state.displayModule)queueDamage(msg.user||"anonymous",msg.amount||1,msg.amount||1);if(msg.type==="external_state")applyExternalState(msg);if(msg.type==="settings")applyRemoteSettings(msg.settings);if(msg.type==="control")handleControl(msg.action);if(msg.type==="status")showNotice(msg.message||"")}
function connectEvents(){const url=remoteConfig.external_websocket_url||remoteConfig.websocketUrl||DEFAULT_REMOTE_CONFIG.external_websocket_url;if(externalSocket)externalSocket.close();if(reconnectTimer)clearTimeout(reconnectTimer);try{externalSocket=new WebSocket(url)}catch(e){showNotice("WebSocket 網址格式錯誤，仍可用測試按鈕。",true);return}externalSocket.onopen=()=>{els.dataStatus.textContent="WebSocket 已連線";showNotice("已連線到外部 WebSocket。")};externalSocket.onmessage=e=>{try{const raw=JSON.parse(e.data),msg=normalizeExternalMessage(raw)||raw;handleMessage(msg)}catch(err){}};externalSocket.onerror=()=>{els.dataStatus.textContent="WebSocket 連線異常"};externalSocket.onclose=()=>{els.dataStatus.textContent="WebSocket 已斷線";if(state.playing)reconnectTimer=setTimeout(connectEvents,3000)}}
function bindClick(buttonId,handler){const el=id(buttonId);if(el)el.onclick=handler}
window.testBossDead=forceBossDeadForTest;window.testBossAlive=forceBossAliveForTest;bindClick("buildBtn",()=>{localStorage.setItem(CONFIG_KEY,JSON.stringify({external_websocket_url:remoteConfig.external_websocket_url||DEFAULT_REMOTE_CONFIG.external_websocket_url}));showNotice("設定已套用到這個瀏覽器。")});["playBtn","stagePlayBtn"].forEach(x=>bindClick(x,start));els.rankList.addEventListener("click",e=>{const btn=e.target.closest(".rollBtn");if(btn)rollGear(btn.dataset.rollName)});window.addEventListener("storage",e=>{if(e.key===CONFIG_KEY)loadRemoteSettings();if(e.key===TEST_KEY)handleStoredTest(e.newValue)});setupTestReceivers();ensureHeroAssets();applySettings();loadRemoteSettings().then(()=>{start();connectEvents();handleStoredTest(localStorage.getItem(TEST_KEY));handleUrlTest()});
</script>
